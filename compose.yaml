services:
  db:
    image: mariadb:11.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_DATABASE: snipeit
      MARIADB_USER: snipeit
      MARIADB_PASSWORD: snipeit
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - snipeit-db:/var/lib/mysql

  snipeit:
    image: snipe/snipe-it:v8.3.7
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:18080
      APP_KEY: base64:4VAW19+8Z2SCeNu7cY4sF5ggKBYOmbhL0A+yYmx0Cec=
      APP_TIMEZONE: UTC
      APP_LOCALE: en
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: snipeit
      MAIL_MAILER: log
    ports:
      - "18080:80"
    volumes:
      - snipeit-data:/var/lib/snipeit

  snip:
    image: golang:1.26.2-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace

volumes:
  snipeit-data:
  snipeit-db:
