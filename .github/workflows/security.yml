name: Security

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - run: gitleaks detect --verbose --redact
