name: Sync Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (e.g. v1.0.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  formula-update:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: Clone homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/cloudcore-tu/homebrew-tap.git" /tmp/homebrew-tap

      - name: Download checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release download "${RELEASE_TAG}" \
            --repo cloudcore-tu/snipe-it-cli \
            --pattern checksums.txt \
            --output /tmp/checksums.txt

      - name: Update formula
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          bash scripts/sync-homebrew-formula.sh "${RELEASE_TAG}" /tmp/checksums.txt /tmp/homebrew-tap
