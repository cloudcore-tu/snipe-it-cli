name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - run: mise exec -- actionlint

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - run: mise exec -- markdownlint-cli2 "**/*.md" "#.claude/**"
