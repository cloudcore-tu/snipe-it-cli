name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      # CHANGELOG.md からタグに対応するセクションを抽出してリリースノートとして渡す
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { flag=1 }
            /^## \[/ && flag && $0 !~ "^## \\[" version "\\]" { exit }
            flag { print }
          ' CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "release notes section for v${version} not found in CHANGELOG.md" >&2
            exit 1
          fi
          echo "Release notes for v${version}:"
          cat /tmp/release_notes.md

      # linux/arm64 の libc ビルド用クロスコンパイラ
      - name: Install cross-compilers
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean --release-notes /tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply release notes to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo cloudcore-tu/snipe-it-cli \
            --notes-file /tmp/release_notes.md

  formula-update:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Clone homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/cloudcore-tu/homebrew-tap.git" /tmp/homebrew-tap

      - name: Download checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo cloudcore-tu/snipe-it-cli \
            --pattern checksums.txt \
            --output /tmp/checksums.txt

      - name: Update formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 /tmp/homebrew-tap/scripts/update-snipe-it-cli-formula.py "${version}" /tmp/checksums.txt

      - name: Commit and push
        run: |
          version="${GITHUB_REF_NAME#v}"
          cd /tmp/homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/snipe-it-cli.rb
          if git diff --cached --quiet; then
            echo "No formula changes"
            exit 0
          fi
          git commit -m "chore: snipe-it-cli formula を v${version} に更新"
          git push
